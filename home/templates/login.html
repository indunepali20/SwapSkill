{% extends 'base.html' %}

{% block content %}

<style>

body{
    background:#f8f8f5;
}

.login-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.login-header{
    background:#66023c;
    color:white;
    padding:30px;
    text-align:center;
}

.login-header h2{
    font-weight:700;
    margin-bottom:8px;
}

.form-control{
    border-radius:10px;
    border:2px solid #cad183;
    padding:12px;
}

.form-control:focus{
    border-color:#66023c;
    box-shadow:0 0 10px rgba(102,2,60,.2);
}

.btn-login{
    background:#66023c;
    color:white;
    border:none;
    padding:12px;
    font-weight:bold;
    border-radius:10px;
    transition:.3s;
}

.btn-login:hover{
    background:#cad183;
    color:#222;
}

.register-link{
    color:#66023c;
    font-weight:bold;
    text-decoration:none;
}

.register-link:hover{
    color:#cad183;
}

.alert{
    border-radius:10px;
}

</style>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-5 col-md-7">

<div class="card login-card">

<div class="login-header">

<h2>Welcome Back</h2>

<p class="mb-0">
Login to your SwapSkill account
</p>

</div>

<div class="card-body p-5">

{% if messages %}

{% for message in messages %}

<div class="alert alert-warning">

{{ message }}

</div>

{% endfor %}

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label fw-bold">

Username

</label>

<input
type="text"
name="username"
class="form-control"
placeholder="Enter your username"
required>

</div>

<div class="mb-4">

<label class="form-label fw-bold">

Password

</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter your password"
required>

</div>

<button class="btn btn-login w-100">

Login

</button>

</form>

<hr>

<p class="text-center mb-0">

Don't have an account?

<a href="/register/" class="register-link">

Register Here

</a>

</p>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
