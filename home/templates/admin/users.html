{% extends "admin/admin_base.html" %}

{% block content %}

<h1>Users</h1>

<table class="table table-dark mt-4">

<tr>
<th>ID</th>
<th>Username</th>
<th>Date Joined</th>
</tr>

{% for user in users %}

<tr>

<td>{{ user.id }}</td>

<td>{{ user.username }}</td>

<td>{{ user.date_joined }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
