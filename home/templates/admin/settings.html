{% extends "admin/admin_base.html" %}

{% block content %}

<h1 class="mb-4">Admin Settings</h1>

<div class="card bg-dark text-white p-4">

<form>

<div class="mb-3">

<label class="form-label">

Website Name

</label>

<input
type="text"
class="form-control"
value="SwapSkills">

</div>

<div class="mb-3">

<label class="form-label">

Support Email

</label>

<input
type="email"
class="form-control"
value="admin@swapskills.com">

</div>

<div class="mb-3">

<label class="form-label">

Maintenance Mode

</label>

<select class="form-select">

<option>Disabled</option>

<option>Enabled</option>

</select>

</div>

<button class="btn btn-success">

Save Settings

</button>

</form>

</div>

{% endblock %}
