<!DOCTYPE html>
<html>
<head>
    <title>SwapSkill Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#1f1f1f;
            color:white;
            display:flex;
            min-height:100vh;
        }

        .sidebar{
            width:260px;
            background:#2b2b2b;
            padding:30px;
        }

        .sidebar h2{
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px 0;
            font-size:20px;
        }

        .sidebar a:hover{
            color:#cad183;
        }

        .content{
            flex:1;
            padding:40px;
        }
    </style>

</head>

<body>

<div class="sidebar">

<h2>SwapSkills</h2>

<a href="{% url 'dashboard' %}">Dashboard</a>

<a href="{% url 'admin_users' %}">Users</a>

<a href="{% url 'admin_skills' %}">Skills</a>

<a href="{% url 'admin_swaps' %}">Swaps</a>

<a href="{% url 'admin_premium' %}">Premium</a>

<a href="{% url 'admin_payments' %}">Payments</a>

<a href="{% url 'admin_settings' %}">Settings</a>

<a href="{% url 'logout' %}">Logout</a>

</div>

<div class="content">

{% block content %}

{% endblock %}

</div>

</body>
</html>
