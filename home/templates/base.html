<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwapSkill</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root{
            --citron:#cad183;
            --tyrian:#66023c;
            --bg:#f8f8f5;
        }

        html,body{
            height:100%;
            margin:0;
        }

        body{
            display:flex;
            flex-direction:column;
            background:var(--bg);
        }

        .main-content{
            flex:1;
        }

        /* NAVBAR */
        .navbar{
            background:rgba(102,2,60,.95)!important;
            position:sticky;
            top:0;
            z-index:1000;
        }

        .navbar-brand{
            font-weight:700;
            color:white!important;
        }

        .btn-theme{
            background:var(--citron);
            color:#222;
            border:none;
            font-weight:600;
        }

        footer{
            background:#66023c;
            color:white;
            margin-top:auto;
        }

        /* ================= CHATBOT ================= */

        #chat-button{
            position:fixed;
            bottom:20px;
            right:20px;
            width:60px;
            height:60px;
            background:linear-gradient(135deg,#66023c,#cad183);
            color:white;
            font-size:26px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            z-index:999999;
        }

        #chat-window{
            position:fixed;
            bottom:90px;
            right:20px;
            width:320px;
            height:420px;
            background:white;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
            display:none;
            flex-direction:column;
            overflow:hidden;
            z-index:999999;
        }

        .chat-header{
            background:#66023c;
            color:white;
            padding:12px;
            font-weight:bold;
        }

        .chat-body{
            flex:1;
            padding:10px;
            overflow-y:auto;
            font-size:14px;
            background:#f8f8f5;
        }

        .chat-input{
            display:flex;
            border-top:1px solid #ddd;
        }

        .chat-input input{
            flex:1;
            padding:10px;
            border:none;
            outline:none;
        }

        .chat-input button{
            background:#cad183;
            border:none;
            padding:10px 15px;
            font-weight:bold;
            cursor:pointer;
        }

        .chat-input button:hover{
            background:#b7c46f;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand" href="/">SwapSkill</a>

        <div>
            <a href="/login/" class="btn btn-outline-light me-2">Login</a>
            <a href="/register/" class="btn btn-theme me-2">Register</a>
            <a href="/add/" class="btn btn-success me-2">Add Skill</a>
            <a href="/premium/" class="btn btn-warning me-2">
    Premium
</a>

</a>
            <a href="/logout/" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="main-content">
    {% block content %}
    {% endblock %}
</div>

<!-- ================= CHATBOT (OUTSIDE BLOCK = FIXED) ================= -->

<div id="chat-button" onclick="toggleChat()">💬</div>

<div id="chat-window">
    <div class="chat-header">
        🤖 SwapSkill chatBot
    </div>

    <div id="chatlog" class="chat-body"></div>

    <div class="chat-input">
        <input id="msg" type="text" placeholder="Ask something...">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
function toggleChat(){
    let box = document.getElementById("chat-window");

    if(box.style.display === "flex"){
        box.style.display = "none";
    } else {
        box.style.display = "flex";
    }
}

function sendMsg(){
    let msg = document.getElementById("msg").value;
    let chatlog = document.getElementById("chatlog");

    if(msg.trim() === "") return;

    chatlog.innerHTML += "<div><b>You:</b> " + msg + "</div>";

    fetch("/chatbot/?message=" + msg)
    .then(res => res.json())
    .then(data => {
        chatlog.innerHTML += "<div><b>Bot:</b> " + data.reply + "</div>";
        chatlog.scrollTop = chatlog.scrollHeight;
    });

    document.getElementById("msg").value = "";
}
</script>

<!-- FOOTER -->
<footer class="py-4">
    <div class="container text-center">
        <h5>SwapSkill</h5>
        <p class="mb-1">Learn • Teach • Grow Together</p>
        <small>© 2026 SwapSkill | Peer-to-Peer Skill Exchange Platform</small>
    </div>
</footer>

</body>
</html>
