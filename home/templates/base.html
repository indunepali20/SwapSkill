<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwapSkill</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root{
            --citron:#cad183;
            --tyrian:#66023c;
            --bg:#f8f8f5;
        }

        html,body{
            height:100%;
            margin:0;
        }

        body{
            display:flex;
            flex-direction:column;
            background:var(--bg);
        }

        .main-content{
            flex:1;
        }

        .navbar{
            background:rgba(102,2,60,.95)!important;
            position:sticky;
            top:0;
            z-index:1000;
        }

        .navbar-brand{
            font-weight:700;
            color:white!important;
        }

        .btn-theme{
            background:var(--citron);
            color:#222;
            border:none;
            font-weight:600;
        }

        .btn-theme:hover{
            transform:translateY(-2px);
        }

        footer{
            background:#66023c;
            color:white;
            margin-top:auto;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">

        <a class="navbar-brand" href="/">
            SwapSkill
        </a>

        <div>
            <a href="/login/" class="btn btn-outline-light me-2">Login</a>
            <a href="/register/" class="btn btn-theme me-2">Register</a>
            <a href="/add/" class="btn btn-success me-2">Add Skill</a>
            <a href="/logout/" class="btn btn-danger">Logout</a>
        </div>

    </div>
</nav>

<div class="main-content">
    {% block content %}
    {% endblock %}
</div>

<footer class="py-4">
    <div class="container text-center">
        <h5>SwapSkill</h5>
        <p class="mb-1">Learn • Teach • Grow Together</p>
        <small>© 2026 SwapSkill | Peer-to-Peer Skill Exchange Platform</small>
    </div>
</footer>

</body>
</html>
